<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Intelligence</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@1/dist/livekit-client.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #0f0f13; color: #e0e0e0; height: 100vh; display: flex;
           flex-direction: column; }

    header { padding: 16px 24px; background: #1a1a24; border-bottom: 1px solid #2a2a3a;
             display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 18px; font-weight: 600; }
    #agent-status { font-size: 13px; padding: 4px 12px; border-radius: 20px;
                    background: #2a2a3a; color: #888; }
    #agent-status.listening { color: #4f8ef7; }
    #agent-status.thinking  { color: #f7854f; }
    #agent-status.speaking  { color: #4ff795; }

    main { display: flex; flex: 1; overflow: hidden; }

    /* Left panel — speakers */
    #speakers-panel { width: 220px; min-width: 220px; padding: 20px 16px;
                      background: #141420; border-right: 1px solid #2a2a3a;
                      display: flex; flex-direction: column; gap: 16px; }
    #speakers-panel h2 { font-size: 11px; font-weight: 600; letter-spacing: .08em;
                          color: #666; text-transform: uppercase; }
    .speaker-row { display: flex; flex-direction: column; gap: 4px; }
    .speaker-label { font-size: 13px; font-weight: 500; }
    .speaker-bar-bg { background: #2a2a3a; border-radius: 4px; height: 6px; }
    .speaker-bar-fill { height: 6px; border-radius: 4px; transition: width .4s ease; }
    .speaker-pct { font-size: 11px; color: #666; }

    #join-btn { margin-top: auto; padding: 10px; background: #4f8ef7; color: #fff;
                border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
                cursor: pointer; }
    #join-btn:hover { background: #3a7ae8; }
    #join-btn:disabled { background: #2a2a3a; color: #555; cursor: default; }

    /* Right panel — transcript */
    #transcript-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #transcript { flex: 1; overflow-y: auto; padding: 20px; display: flex;
                  flex-direction: column; gap: 10px; }
    .line { display: flex; gap: 10px; align-items: flex-start; }
    .line-speaker { font-size: 12px; font-weight: 700; min-width: 32px;
                    padding-top: 2px; flex-shrink: 0; }
    .line-text { font-size: 14px; line-height: 1.5; color: #ccc; }
    .line.agent .line-speaker { color: #4ff795; }
    .line.agent .line-text { color: #e0e0e0; font-style: italic; }
  </style>
</head>
<body>
  <header>
    <h1>🎙 Meeting Intelligence <span style="color:#555;font-weight:400;font-size:14px">· Powered by Speechmatics</span></h1>
    <span id="agent-status">Agent offline</span>
  </header>

  <main>
    <div id="speakers-panel">
      <h2>Speakers</h2>
      <div id="speaker-bars"></div>
      <button id="join-btn">Join Meeting</button>
    </div>
    <div id="transcript-panel">
      <div id="transcript">
        <div class="line" style="color:#444;font-size:13px">
          <span class="line-text">Transcript will appear here once you join...</span>
        </div>
      </div>
    </div>
  </main>

  <script>
    const COLORS = ['#4f8ef7','#f7854f','#4ff795','#f74fda','#f7f04f','#4ffbf7'];
    const speakerColors = {};
    let colorIdx = 0;

    function colorFor(id) {
      if (!speakerColors[id]) speakerColors[id] = COLORS[colorIdx++ % COLORS.length];
      return speakerColors[id];
    }

    function appendLine(speakerId, text, isAgent = false) {
      const div = document.createElement('div');
      div.className = 'line' + (isAgent ? ' agent' : '');
      const color = isAgent ? '#4ff795' : colorFor(speakerId);
      div.innerHTML = `
        <span class="line-speaker" style="color:${color}">${speakerId}</span>
        <span class="line-text">${text}</span>
      `;
      const transcript = document.getElementById('transcript');
      if (transcript.querySelector('[style*="color:#444"]')) {
        transcript.innerHTML = '';
      }
      transcript.appendChild(div);
      transcript.scrollTop = transcript.scrollHeight;
    }

    function renderBars(speakers) {
      const container = document.getElementById('speaker-bars');
      container.innerHTML = '';
      Object.entries(speakers)
        .sort((a, b) => b[1].words - a[1].words)
        .forEach(([id, stats]) => {
          const color = colorFor(id);
          const name = stats.name || id;
          container.innerHTML += `
            <div class="speaker-row">
              <span class="speaker-label" style="color:${color}">${name}</span>
              <div class="speaker-bar-bg">
                <div class="speaker-bar-fill" style="width:${stats.pct}%;background:${color}"></div>
              </div>
              <span class="speaker-pct">${stats.pct}% · ${stats.words} words</span>
            </div>
          `;
        });
    }

    function updateStatus(state) {
      const el = document.getElementById('agent-status');
      const labels = { listening: '● Listening', thinking: '◐ Thinking', speaking: '▶ Speaking', initializing: '○ Starting' };
      el.textContent = labels[state] || state;
      el.className = state;
    }

    document.getElementById('join-btn').addEventListener('click', async () => {
      const btn = document.getElementById('join-btn');
      btn.disabled = true;
      btn.textContent = 'Connecting...';

      try {
        const res = await fetch('/token');
        const { token, url } = await res.json();

        const room = new LivekitClient.Room();

        room.on(LivekitClient.RoomEvent.DataReceived, (payload) => {
          try {
            const msg = JSON.parse(new TextDecoder().decode(payload));
            if (msg.type === 'transcript') {
              appendLine(msg.speaker_id, msg.text);
            } else if (msg.type === 'stats') {
              renderBars(msg.speakers);
            } else if (msg.type === 'agent_state') {
              updateStatus(msg.state);
            }
          } catch (e) { /* ignore non-JSON */ }
        });

        await room.connect(url, token);

        // Explicitly publish with Track.Source.Microphone so the Python agent
        // accepts it (it filters by SOURCE_MICROPHONE only).
        const micTrack = await LivekitClient.createLocalAudioTrack({
          echoCancellation: true,
          noiseSuppression: false,
          autoGainControl: true,
        });
        await room.localParticipant.publishTrack(micTrack, {
          source: LivekitClient.Track.Source.Microphone,
        });

        btn.textContent = 'Connected ✓';
        updateStatus('listening');
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Join Meeting';
        console.error(err);
        alert('Failed to connect: ' + err.message);
      }
    });
  </script>
</body>
</html>
